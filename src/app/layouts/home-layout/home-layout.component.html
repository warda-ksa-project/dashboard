<div class="layout-container">
  <div class="content">
    <aside
      class="side-nav"
      [class.collapsed]="sidebarState.collapsed()"
    >
      <app-sidebar
        [activeRoute]="router.url"
        [collapsed]="sidebarState.collapsed()"
        (toggleSidebar)="sidebarState.toggle()"
      ></app-sidebar>
    </aside>

    <div class="main-home-content">
      <app-navbar
        (menuToggle)="onMobileMenuToggle()"
        (sidebarToggle)="sidebarState.toggle()"
        [sidebarCollapsed]="sidebarState.collapsed()"
      ></app-navbar>

      <div class="home-content" [class.bk-gray]="isDashboardStyle">
        <router-outlet />
      </div>
    </div>
  </div>

  @if (showMenuIcon) {
    <div
      class="side-nav-bar"
      appClickOutside
      (onClickOutSideCompleted)="onClickOutSideCompleted($event)"
    >
      <app-side-nav [activeRoute]="router.url"></app-side-nav>
    </div>
    <div class="mobile-overlay" (click)="showMenuIcon = false"></div>
  }
</div>
