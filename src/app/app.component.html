<router-outlet />
<ngx-spinner
  size="large"
  color="#f5d0dc"
  type="ball-clip-rotate"
  [fullScreen]="true"
>
  <div class="warda-loader">
    <img [src]="loaderLogoSrc" alt="Warda" class="warda-loader__logo" />
    <p class="warda-loader__text">{{ "LOADER.PLEASE_WAIT" | translate }}</p>
  </div>
</ngx-spinner>
<p-toast [position]="toastPosition"></p-toast>
