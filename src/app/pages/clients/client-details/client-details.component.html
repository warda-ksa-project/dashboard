<div class="page-form-container container-fluid">
  <div class="row">
    <div class="page-details mb-3">
      <div class="title">
        <h2>{{ pageName() | translate | titlecase }}</h2>
      </div>
      <div class="breadcrumb">
        <app-breadcrump [breadcrumbProps]="bredCrumb"></app-breadcrump>
      </div>
    </div>
  </div>

  <div class="form-container client-details-page">
    <div class="info-card mb-4">
      <h4 class="mb-3">{{ 'order.form.customerInfo' | translate }}</h4>
      <div class="row g-3">
        <div class="col-md-6">
          <app-input-text [label]="'client.form.name'" [control]="form.get('name')"></app-input-text>
        </div>
        <div class="col-md-6">
          <app-input-text [label]="'client.form.mobile'" [control]="form.get('phone')"></app-input-text>
        </div>
        <div class="col-md-6">
          <app-input-text [label]="'client.form.email'" [control]="form.get('email')"></app-input-text>
        </div>
        <div class="col-md-6">
          <app-input-text [label]="'client.form.status'" [control]="form.get('isActive')"></app-input-text>
        </div>
      </div>
    </div>

    <app-client-wallet-panel [clientId]="clientId"></app-client-wallet-panel>
  </div>
</div>
