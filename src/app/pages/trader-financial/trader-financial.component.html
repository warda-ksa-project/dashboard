<div class="container-fluid p-4" *ngIf="data">
  <h2>Trader Financial Dashboard</h2>
  <div class="row g-3">
    <div class="col-md-4"><div class="card p-3"><strong>Available Balance</strong><div>{{ data.availableBalance }} {{ data.currency }}</div></div></div>
    <div class="col-md-4"><div class="card p-3"><strong>Gross Sales</strong><div>{{ data.totalGrossSales }}</div></div></div>
    <div class="col-md-4"><div class="card p-3"><strong>Commission</strong><div>{{ data.totalCommission }}</div></div></div>
    <div class="col-md-4"><div class="card p-3"><strong>Net Earnings</strong><div>{{ data.totalNetEarnings }}</div></div></div>
    <div class="col-md-4"><div class="card p-3"><strong>Completed Orders</strong><div>{{ data.completedOrdersCount }}</div></div></div>
  </div>
</div>
